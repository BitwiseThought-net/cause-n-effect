services:
  # The Webhook Web Server (Ingester)
  causality-webhook:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my-webhook-listener
    restart: unless-stopped
    ports:
      - "8042:80"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - RABBITMQ_HOST=rabbitmq-server
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASS=${RABBITMQ_PASS}
    depends_on:
      rabbitmq-server:
        condition: service_healthy

  # The Background Processing Worker (Consumer)
  causality-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my-webhook-worker
    restart: unless-stopped
    volumes:
      - .:/app
    command: ["python", "worker.py"]
    environment:
      - PYTHONUNBUFFERED=1
      - RABBITMQ_HOST=rabbitmq-server
      - RABBITMQ_USER=${RABBITMQ_USER}
      - RABBITMQ_PASS=${RABBITMQ_PASS}
      # MongoDB Connection Info
      - MONGO_HOST=mongodb-server
      - MONGO_PORT=27017
    depends_on:
      rabbitmq-server:
        condition: service_healthy
      mongodb-server:
        condition: service_started

  # The RabbitMQ Message Broker
  causality-rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: my-rabbitmq-broker
    restart: unless-stopped
    ports:
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 3

  # The MongoDB Persistent Storage
  causality-mongodb:
    image: mongo:7.0
    container_name: my-mongodb-database
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      # Named volume keeps your data safe even if you stop/destroy containers
      - mongo-data:/data/db

volumes:
  mongo-data:
