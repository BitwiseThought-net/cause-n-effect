name: Continuous Integration

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  integration-test:
    name: Build Stack and Run Webhook Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Generate Secure Tokens and .env File
        run: |
          chmod +x setup_env.sh
          ./setup_env.sh

      - name: Start Docker Compose Stack
        run: |
          docker compose up --build -d

      - name: Wait for Infrastructure Readiness
        run: |
          echo "Waiting for services to settle..."
          sleep 10

      - name: Run End-to-End Signature Webhook Test
        run: |
          .venv/bin/python test_webhook.py

      - name: Run End-to-End Token Webhook Test
        run: |
          chmod +x test.sh
          ./test.sh -token

      - name: Teardown and Log Collection
        if: always()
        run: |
          echo "=== Web Server Logs ==="
          docker compose logs causality-webhook
          echo "=== Background Worker Logs ==="
          docker compose logs causality-worker
          docker compose down -v
